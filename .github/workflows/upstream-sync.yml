name: Upstream Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  sync:
    runs-on: ubuntu-latest
    if: ${{ github.event.repository.fork }}
    env:
      UPSTREAM_REPOSITORY: ${{ vars.UPSTREAM_REPOSITORY || 'PAIR-code/lumi' }}
      UPSTREAM_BRANCH: ${{ vars.UPSTREAM_BRANCH || 'main' }}
      TARGET_BRANCH: ${{ github.event.repository.default_branch }}
      SYNC_BRANCH: ${{ vars.SYNC_BRANCH || 'sync-upstream-main' }}
    steps:
      - name: Check out fork default branch
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.UPSTREAM_SYNC_PAT || github.token }}
          ref: ${{ github.event.repository.default_branch }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream "https://github.com/${UPSTREAM_REPOSITORY}.git" || true
          git fetch upstream "$UPSTREAM_BRANCH"

      - name: Prepare sync branch
        run: git checkout -B "$SYNC_BRANCH" "origin/$TARGET_BRANCH"

      - name: Merge upstream into sync branch
        id: merge
        run: |
          set +e
          git merge --no-ff --no-edit "upstream/$UPSTREAM_BRANCH"
          status=$?
          if [ "$status" -ne 0 ]; then
            {
              echo "files<<EOF"
              git diff --name-only --diff-filter=U
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            echo "status=conflict" >> "$GITHUB_OUTPUT"
            git merge --abort
            exit "$status"
          fi
          echo "status=clean" >> "$GITHUB_OUTPUT"

      - name: Push sync branch
        if: ${{ success() }}
        run: git push --force-with-lease origin "$SYNC_BRANCH"

      - name: Create or update sync pull request
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ secrets.UPSTREAM_SYNC_PAT || github.token }}
        run: |
          existing_pr="$(gh pr list --head "$SYNC_BRANCH" --base "$TARGET_BRANCH" --json number --jq '.[0].number')"
          if [ -n "$existing_pr" ]; then
            gh pr edit "$existing_pr" \
              --title "Sync ${UPSTREAM_REPOSITORY}:${UPSTREAM_BRANCH}" \
              --body "Automated upstream sync PR generated by the upstream sync workflow."
          else
            gh pr create \
              --base "$TARGET_BRANCH" \
              --head "$SYNC_BRANCH" \
              --title "Sync ${UPSTREAM_REPOSITORY}:${UPSTREAM_BRANCH}" \
              --body "Automated upstream sync PR generated by the upstream sync workflow."
          fi

      - name: Open conflict issue
        if: ${{ failure() && steps.merge.outputs.status == 'conflict' }}
        uses: actions-cool/issues-helper@v3
        with:
          actions: "create-issue"
          title: "🚨 Upstream sync conflict"
          labels: "🚨 Sync Fail"
          body: |
            Automatic sync from `${{ env.UPSTREAM_REPOSITORY }}` into `${{ env.TARGET_BRANCH }}` hit merge conflicts.

            Conflicted files:
            ${{ steps.merge.outputs.files }}

      - name: Close conflict issue after successful sync
        if: ${{ success() }}
        uses: actions-cool/issues-helper@v3
        with:
          actions: "close-issues"
          labels: "🚨 Sync Fail"
